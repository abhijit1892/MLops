name: Deploy MLOps Pipeline to AWS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy via SSH to AWS EC2
      uses: appleboy/ssh-action@master
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
        script: |
          # 1. Ensure project directory exists
          mkdir -p /home/${{ secrets.EC2_USERNAME }}/MLops
          cd /home/${{ secrets.EC2_USERNAME }}/MLops
          
          # 2. Setup git repository if it doesn't exist, else pull latest
          if [ ! -d ".git" ]; then
            git clone git@github.com:${{ github.repository }}.git .
          else
            git pull origin main
          fi
          
          # 3. Create .env file for AWS credentials to be used by docker-compose
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" > .env
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> .env
          
          # 4. Spin down existing containers, rebuild, and start detatched
          sudo docker-compose down
          sudo docker-compose up --build -d
          
          # 4. Show running services
          sudo docker-compose ps
