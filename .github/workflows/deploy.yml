name: Deploy MLOps Pipeline to AWS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Upload Dataset to AWS S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: "us-east-1" 
      run: |
        # Natively copy the local repo dataset directly into the predictive S3 bucket
        aws s3 cp dataset/Travel.csv s3://predict-1/raw-data/Travel.csv

    - name: Deploy via SSH to AWS EC2
      uses: appleboy/ssh-action@master
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
        script: |
          # 1. Install Docker and Docker-compose automatically if missing
          if ! command -v docker-compose &> /dev/null
          then
              echo "Installing Docker..."
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose git
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
          fi
          
          # 2. Ensure project directory exists
          mkdir -p /home/${{ secrets.EC2_USERNAME }}/MLops
          cd /home/${{ secrets.EC2_USERNAME }}/MLops
          
          # 3. Force sync repository securely (bypass directory-not-empty errors)
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://github.com/${{ github.repository }}.git
            git fetch --all
            git reset --hard origin/main
          else
            git fetch --all
            git reset --hard origin/main
          fi
          
          # 3. Create .env file for AWS credentials to be used by docker-compose
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" > .env
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> .env
          
          # 4. Spin down existing containers, rebuild, and start detatched
          sudo docker-compose down
          sudo docker-compose up --build -d
          
          # 4. Show running services
          sudo docker-compose ps
